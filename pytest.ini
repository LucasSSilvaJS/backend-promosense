[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: testes unitários (funções isoladas)
    integration: testes de integração (API + camadas)
    system: testes de sistema (fluxo completo)
addopts = -v --tb=short --strict-markers
filterwarnings =
    ignore::DeprecationWarning
