services:
  - type: web
    name: backend-promosense
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ENVIRONMENT
        value: production
      - key: API_PUBLIC_URL
        value: https://backend-promosense.onrender.com
      - key: ALLOWED_HOSTS
        value: backend-promosense.onrender.com
      - key: CORS_ORIGINS
        value: https://promosense.vercel.app,http://localhost:3000,http://localhost:5173
      - key: DOCS_ENABLED
        value: "true"
